<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Nexus EMS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div id="login-screen">
  <div class="login-left">
    <div class="login-brand">
      <div class="login-brand-badge">✦ Enterprise Suite</div>
      <h1>Nexus<br><span>EMS</span></h1>
      <div class="login-divider"></div>
      <p>A unified platform for employee lifecycle management — from onboarding to payroll, leave, and performance reviews.</p>
    </div>
  </div>

  <div class="login-right">
    <div class="login-card">
      <div class="login-card-header">
        <h2>Sign In</h2>
        <p>Access your workspace dashboard</p>
      </div>

      <div class="login-role-tabs" role="tablist">
        <button class="login-role-tab active" onclick="selectRole(this,'hr')" type="button">HR Admin</button>
        <button class="login-role-tab" onclick="selectRole(this,'supervisor')" type="button">Supervisor</button>
        <button class="login-role-tab" onclick="selectRole(this,'employee')" type="button">Employee</button>
      </div>

      <form id="login-form" onsubmit="doLogin(event)">
        <div class="form-group">
          <label class="form-label" for="login-email">Official Email</label>
          <input class="form-control" type="email" id="login-email" name="email" placeholder="you@company.com" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-control" type="password" id="login-password" name="password" placeholder="••••••••" required>
        </div>

        <button class="btn btn-primary btn-full" type="submit" style="margin-top:.5rem;">
            Sign In &rarr;
        </button>
      </form>

      <div class="login-footer">
          Demo credentials: any email &amp; password work for prototype
      </div>
    </div>
  </div>
</div>

<div id="global-toast" class="toast"></div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
